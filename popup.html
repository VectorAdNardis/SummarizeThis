<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="container">
    <header>
      <h1>Summarize This</h1>
      <button id="settings-toggle" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <div id="settings-panel" class="settings hidden">
      <label>
        API Endpoint
        <input type="text" id="api-endpoint" placeholder="http://localhost:1234/v1/chat/completions">
      </label>
      <label>
        Model Name
        <input type="text" id="model-name" placeholder="default">
      </label>
      <label>
        Max Input Length (chars)
        <input type="number" id="max-chars" placeholder="10000" min="1000" step="1000">
        <span class="settings-hint">Max page text sent to the LLM. Lower if you get context errors.</span>
      </label>
      <label>
        Summary Format
        <select id="summary-format">
          <option value="plain">Plain text</option>
          <option value="markdown">Markdown</option>
        </select>
      </label>
      <div class="settings-divider"></div>
      <label>
        Export Mode
        <select id="export-mode">
          <option value="ask">Always ask where to save</option>
          <option value="auto">Auto-save to subfolder</option>
        </select>
      </label>
      <label>
        Export Subfolder
        <input type="text" id="export-subfolder" placeholder="PageSummaries">
        <span class="settings-hint">Relative to your Downloads folder (used in auto mode)</span>
      </label>
      <button id="save-settings" class="btn btn-small">Save</button>
    </div>

    <div class="action-row">
      <button id="summarize-btn" class="btn btn-primary">Summarize</button>
      <button id="extend-btn" class="btn btn-outline hidden">Extend</button>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <span>Summarizing...</span>
    </div>

    <div id="error" class="error hidden"></div>

    <div id="content-panels" class="hidden">
      <div class="accordion">
        <button id="summary-toggle" class="accordion-header active">
          <svg class="accordion-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          Summary
          <span id="truncation-note" class="note hidden"></span>
        </button>
        <div id="summary-body" class="accordion-body">
          <div id="summary-text"></div>
        </div>
      </div>

      <div class="accordion">
        <button id="chat-toggle" class="accordion-header active">
          <svg class="accordion-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          Chat
        </button>
        <div id="chat-body" class="accordion-body">
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Ask a question about this page..." />
            <button id="chat-send" class="btn btn-primary chat-send-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="copy-bar">
        <div class="copy-dropdown">
          <button id="export-btn" class="btn btn-small">Export .md</button>
          <div id="export-menu" class="copy-menu hidden">
            <button id="export-summary" class="copy-option">Summary only</button>
            <button id="export-all" class="copy-option">Summary + Chat</button>
          </div>
        </div>
        <div class="copy-dropdown">
          <button id="copy-btn" class="btn btn-small">Copy</button>
          <div id="copy-menu" class="copy-menu hidden">
            <button id="copy-summary" class="copy-option">Summary only</button>
            <button id="copy-all" class="copy-option">Summary + Chat</button>
          </div>
        </div>
      </div>
    </div>

    <div class="history-section">
      <button id="history-toggle" class="btn btn-secondary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        History <span id="history-count"></span>
      </button>
      <div id="history-panel" class="hidden">
        <div id="history-list"></div>
        <button id="clear-history" class="btn btn-small btn-danger">Clear History</button>
      </div>
    </div>

    <a href="https://github.com/VectorAdNardis" target="_blank" class="footer-github">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      VectorAdNardis
    </a>
  </div>

  <script src="lib/pdf.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
